# =====================================================================
# CompliGuard AI -- AML rule definitions (consumed by the rule engine)
#
# Typology rules are based on Securities Commission Malaysia red-flag
# indicators. These are DEMO / internal-review values -- in production they must
# come from the institution's own AML rule configuration and risk appetite, and
# are NOT legal "reporting thresholds". Suspicion is contextual, not amount alone.
#
# Edit these values, then POST /rules/reload (no restart needed).
# =====================================================================

currency: MYR

# ---- SC red-flag-based typology detection rules ----
typology_rules:
  - rule_id: AML-STRUCT-001
    name: Structuring / Smurfing Pattern
    typology: structuring
    description: Multiple transactions made in short succession in amounts close to the internal review threshold.
    conditions:
      internal_review_threshold: 10000
      amount_min_ratio_to_threshold: 0.90
      amount_below_threshold: true
      min_transactions: 3
      window_hours: 24
      new_recipient_bonus: true
    risk_points: 25
    severity: HIGH
    evidence_template: "{count} transfers between RM{min_amount} and RM{max_amount} within {window_hours}h to a newly added recipient."

  - rule_id: AML-MULE-001
    name: Possible Money Mule Account
    typology: money_mule
    description: Large incoming funds rapidly forwarded to multiple new or unrelated recipients.
    conditions:
      incoming_amount_min: 20000
      outgoing_ratio_min: 0.80
      max_forwarding_hours: 24
      min_new_recipients: 2
      customer_profile_mismatch_bonus: true
    risk_points: 30
    severity: HIGH
    evidence_template: "Inbound RM{incoming_total} forwarded as RM{total_recent} to {distinct} new recipient(s) within {window_hours}h."

  - rule_id: AML-LAYER-001
    name: Layering / Dispersion Pattern
    typology: layering_dispersion
    description: Funds split across many recipients quickly to obscure the source trail.
    conditions:
      min_distinct_recipients: 5
      window_hours: 24
      new_recipients_required: true
    risk_points: 30
    severity: HIGH
    evidence_template: "Funds dispersed across {distinct} new recipients within {window_hours}h."

  - rule_id: AML-GEO-001
    name: High-Risk Overseas Transfer
    typology: high_risk_overseas_transfer
    description: Cross-border transfer to a high-risk or internally flagged jurisdiction.
    conditions:
      cross_border: true
      recipient_country_risk_in: [HIGH, CALL_FOR_ACTION, INCREASED_MONITORING]
      new_recipient_bonus: true
    risk_points: 20
    severity: MEDIUM_HIGH
    evidence_template: "Transfer to high-risk jurisdiction(s): {countries}."

  - rule_id: AML-VOL-001
    name: Volume Spike vs Customer Profile
    typology: volume_spike
    description: Multiple high-value transactions that do not commensurate with the customer's profile.
    conditions:
      baseline_multiplier: 10
    risk_points: 15
    severity: MEDIUM
    evidence_template: "Burst of RM{total_recent} far exceeds the customer's baseline (avg RM{avg_historical})."

# ---- false-positive reduction (lowers score when activity is explainable) ----
false_positive:
  rule_id: AML-FP-001
  name: Legitimate Transaction False Positive Check
  typology: false_positive
  description: Reduces risk when the transaction is explainable and supported by evidence.
  conditions:
    known_recipient: true
    historical_pattern_match: true
    supporting_document_exists: true
    no_watchlist_match: true
    no_high_risk_country: true
  risk_adjustment: -35
  severity: REDUCTION
  evidence_template: "{prior_false_positives} prior false positive(s), recipient known, no escalations."

# ---- supplementary scoring factors (contribute to the score, not red-flag typologies) ----
kyc:
  rule_id: AML-KYC-001
  name: Income / Activity Mismatch
  severity: MEDIUM
  income_mismatch_ratio: 2.0
  risk_points: 20

# Per SC guidance, unusual transactions should have a clear economic purpose.
# An overseas transfer to a high-risk jurisdiction with NO stated purpose is an
# escalation on top of the geographic risk.
unclear_purpose:
  rule_id: AML-PURPOSE-001
  name: Unclear Economic Purpose (High-Risk Transfer)
  severity: HIGH
  risk_points: 15

# Negative news (fraud, investigations, enforcement) -- a real risk signal a
# sanctions/PEP list does not capture. CRITICAL hits are weighted higher.
adverse_media:
  rule_id: AML-ADVMEDIA-001
  name: Adverse Media / Negative News
  severity: HIGH
  risk_points: 20
  critical_risk_points: 30

watchlist:
  match_rule_id: AML-WL-001
  match_name: Watchlist Match
  match_severity: HIGH
  country_rule_id: AML-GEO-002
  country_name: High-Risk Country
  country_severity: LOW
  match_threshold: 80
  review_threshold: 70
  match_risk_points: 25
  high_risk_country_points: 10

history:
  rule_id: AML-HIST-001
  name: Prior Alert History
  severity: LOW
  prior_alert_points: 10

memory:
  escalation_rule_id: AML-MEM-001
  escalation_name: Repeat Offender
  escalation_severity: MEDIUM
  recipient_rule_id: AML-MEM-002
  recipient_name: Repeat Recipient
  recipient_severity: MEDIUM
  prior_escalation_points: 15
  repeat_recipient_points: 10

# ---- account behaviour baseline (deviation from the customer's OWN normal) ----
# SC red flags: large withdrawals from dormant/inactive accounts, sudden
# unexpectedly large activity, transfers to new geographies.
behavior_baseline:
  amount_spike_multiplier: 5
  amount_spike:
    rule_id: AML-BEHAV-001
    name: Amount Spike vs Account Baseline
    severity: HIGH
    points: 15
  new_country:
    rule_id: AML-BEHAV-002
    name: Transfer to a New Country
    severity: MEDIUM
    points: 10
  off_hours:
    rule_id: AML-BEHAV-003
    name: Activity Outside Usual Hours
    severity: LOW
    points: 5
    start: 9
    end: 18
  new_recipient_high:
    rule_id: AML-BEHAV-004
    name: High-Value Transfer to a New Recipient
    severity: HIGH
    points: 15
    amount_threshold: 10000
  dormancy:
    rule_id: AML-BEHAV-005
    name: Dormant Account Reactivation
    severity: HIGH
    points: 20
    days: 90

scoring:
  escalation_threshold: 60           # final score at/above this escalates to a SAR
