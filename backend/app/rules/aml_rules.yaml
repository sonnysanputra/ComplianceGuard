# =====================================================================
# CompliGuard AI -- AML rule definitions (consumed by the rule engine)
#
# IMPORTANT: these are DEMO / internal-review values. In production they must
# come from the institution's own AML rule configuration and risk appetite --
# they are NOT legal "reporting thresholds". AML suspicion is assessed on
# knowledge of the customer, economic purpose, and risk context, not amount
# alone. (cf. SC/BNM AML guidance.)
#
# Edit these values, then POST /rules/reload (no restart needed).
# =====================================================================

currency: MYR

structuring:
  rule_id: AML-STRUCT-001
  name: Structuring Pattern
  severity: HIGH
  internal_review_threshold: 10000     # amounts kept just under this are reviewed
  lower_bound_ratio: 0.90              # "just under" = 90-100% of the threshold
  min_transactions: 3
  window_hours: 24
  risk_points: 25

money_mule:
  rule_id: AML-MULE-001
  name: Money Mule Pattern
  severity: HIGH
  incoming_min_amount: 20000
  outgoing_ratio_min: 0.80            # forwards >= 80% of what came in
  max_forwarding_hours: 24
  min_new_recipients: 2
  risk_points: 30

layering_dispersion:
  rule_id: AML-LAYER-001
  name: Layering / Dispersion
  severity: HIGH
  min_recipients: 5
  window_hours: 24
  risk_points: 30

high_risk_overseas:
  rule_id: AML-GEO-001
  name: High-Risk Overseas Transfer
  severity: MEDIUM
  new_recipient_required: true
  risk_points: 20

volume_spike:
  rule_id: AML-VOL-001
  name: Volume Spike
  severity: MEDIUM
  baseline_multiplier: 10            # activity > 10x the customer's own baseline
  risk_points: 15

kyc:
  rule_id: AML-KYC-001
  name: Income / Activity Mismatch
  severity: MEDIUM
  income_mismatch_ratio: 2.0         # activity > 2x declared monthly income
  risk_points: 20

watchlist:
  match_rule_id: AML-WL-001
  match_name: Watchlist Match
  match_severity: HIGH
  country_rule_id: AML-GEO-002
  country_name: High-Risk Country
  country_severity: LOW
  match_threshold: 80                # >= treated as a hit
  review_threshold: 70               # >= surfaced for manual review
  match_risk_points: 25
  high_risk_country_points: 10

history:
  rule_id: AML-HIST-001
  name: Prior Alert History
  severity: LOW
  prior_alert_points: 10

memory:
  escalation_rule_id: AML-MEM-001
  escalation_name: Repeat Offender
  escalation_severity: MEDIUM
  recipient_rule_id: AML-MEM-002
  recipient_name: Repeat Recipient
  recipient_severity: MEDIUM
  prior_escalation_points: 15
  repeat_recipient_points: 10

false_positive:
  rule_id: AML-FP-001
  name: Benign History Reduction
  severity: INFO
  known_recipient_required: true
  supporting_document_required: true
  risk_reduction_points: 35          # lowers score when history is consistently benign

scoring:
  escalation_threshold: 60           # final score at/above this escalates to a SAR
