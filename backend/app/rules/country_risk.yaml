# High-risk jurisdictions and their FATF-style risk level. Edit + POST /rules/reload.
#   CALL_FOR_ACTION     = FATF "black list" (high-risk, counter-measures)
#   INCREASED_MONITORING = FATF "grey list" (jurisdictions under increased monitoring)
#   HIGH                 = internally designated high-risk
countries:
  North Korea: CALL_FOR_ACTION
  Iran: CALL_FOR_ACTION
  Myanmar: CALL_FOR_ACTION
  Cambodia: INCREASED_MONITORING
